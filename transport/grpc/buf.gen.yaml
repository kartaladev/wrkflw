# buf.gen.yaml — regeneration config for transport/grpc/workflowpb
#
# To regenerate:
#   cd transport/grpc
#   buf generate   (requires buf installed: go install github.com/bufbuild/buf/cmd/buf@latest)
#
# Or without buf (raw protoc, as used in initial generation):
#   export PATH="$PATH:$(go env GOPATH)/bin"
#   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
#   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
#   protoc \
#     --proto_path=proto \
#     --go_out=workflowpb --go_opt=paths=source_relative \
#     --go-grpc_out=workflowpb --go-grpc_opt=paths=source_relative \
#     proto/workflow.proto
version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: workflowpb
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: workflowpb
    opt: paths=source_relative
